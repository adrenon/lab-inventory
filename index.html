<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLog | Molecular Lab Inventory</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--light); padding-bottom: 1rem; margin-bottom: 2rem; }
        
        .controls { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 2rem; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 4px; transition: 0.3s; }
        .btn-add { background: var(--secondary); color: white; }
        .btn-add:hover { background: #219150; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; background: var(--light); padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .stock-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .low { background: #ffebee; color: var(--danger); }
        .ok { background: #e8f5e9; color: var(--secondary); }

        .qty-controls button { background: #eee; font-weight: bold; width: 30px; }
        .qty-controls span { margin: 0 10px; font-family: monospace; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🧬 BioLog Inventory</h1>
        <div id="user-status">Status: 🟢 Live Sync Active</div>
    </header>

    <div class="controls">
        <input type="text" id="itemName" placeholder="Item Name (e.g. Taq Polymerase)">
        <input type="text" id="catalogNum" placeholder="Catalog #">
        <select id="category">
            <option value="Reagents">Reagents</option>
            <option value="Plasticware">Plasticware</option>
            <option value="Kits">Kits</option>
            <option value="Buffers">Buffers</option>
        </select>
        <button class="btn-add" onclick="addItem()">+ Add Item</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Category</th>
                <th>Catalog #</th>
                <th>Stock Level</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="inventoryBody">
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Your verified Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBQH4A3W0tcVVF9RSj8y51d3WxKGITrNnU",
        authDomain: "lab-inventory-8b584.firebaseapp.com",
        projectId: "lab-inventory-8b584",
        storageBucket: "lab-inventory-8b584.firebasestorage.app",
        messagingSenderId: "768314798306",
        appId: "1:768314798306:web:405d5dec243cb66105aebb",
        measurementId: "G-VG4ZHC2MJ4",
        databaseURL: "https://lab-inventory-8b584-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const inventoryRef = ref(db, 'inventory');

    let inventory = [];

    onValue(inventoryRef, (snapshot) => {
        const data = snapshot.val();
        inventory = data ? Object.values(data) : [];
        renderTable();
    });

    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = '';

        inventory.forEach(item => {
            const status = item.qty <= item.min ? 'low' : 'ok';
            const row = `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.cat}</td>
                    <td><code>${item.sku}</code></td>
                    <td class="qty-controls">
                        <button onclick="updateQty('${item.id}', -1)">-</button>
                        <span>${item.qty}</span>
                        <button onclick="updateQty('${item.id}', 1)">+</button>
                    </td>
                    <td><span class="stock-badge ${status}">${status.toUpperCase()}</span></td>
                    <td><button onclick="deleteItem('${item.id}')" style="color:red">Delete</button></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    window.addItem = function() {
        const name = document.getElementById('itemName').value;
        const sku = document.getElementById('catalogNum').value;
        const cat = document.getElementById('category').value;

        if(name && sku) {
            const id = Date.now().toString();
            set(ref(db, 'inventory/' + id), {
                id: id,
                name: name,
                cat: cat,
                sku: sku,
                qty: 1,
                min: 2
            });
            document.getElementById('itemName').value = '';
            document.getElementById('catalogNum').value = '';
        }
    };

    window.updateQty = function(id, change) {
        const item = inventory.find(i => i.id === id);
        if(item && (item.qty + change >= 0)) {
            update(ref(db, 'inventory/' + id), {
                qty: item.qty + change
            });
        }
    };

    window.deleteItem = function(id) {
        if(confirm("Delete this item from the lab database?")) {
            remove(ref(db, 'inventory/' + id));
        }
    };
</script>

</body>
</html>
